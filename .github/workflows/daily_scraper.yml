name: Daily Scraper

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 11:00 Istanbul (UTC+3)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fibre2fashion scraper
        run: python scrapers/fibre2fashion.py --pages 2

      - name: Run just_style scraper
        run: python scrapers/just_style.py --pages 2

      - name: Run tekstil_teknik scraper
        run: python scrapers/tekstil_teknik.py --pages 3

      - name: Run LLM analyzer
        run: python scrapers/llm_analyzer.py --limit 50

      - name: Send Telegram report
        run: python scrapers/telegram_reporter.py
