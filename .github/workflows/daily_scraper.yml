name: Daily Scraper

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 11:00 Istanbul (UTC+3)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --force-reinstall "httpx==0.27.2"
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir --force-reinstall "httpx==0.27.2"
          python -c "import httpx; print('httpx:', httpx.__version__)"
          python -c "import openai; print('openai:', openai.__version__)"

      - name: Debug openai version
        run: |
          python -c "import openai; print('openai:', openai.__version__)"
          python -c "import httpx; print('httpx:', httpx.__version__)"

      - name: Run fibre2fashion scraper
        run: python scrapers/fibre2fashion.py --pages 2

      - name: Run just_style scraper
        run: python scrapers/just_style.py --pages 2

      - name: Run tekstil_teknik scraper
        run: python scrapers/tekstil_teknik.py --pages 3

      - name: Run textilegence scraper
        run: python scrapers/textilegence.py --pages 5

      - name: Run price signals scraper
        run: python scrapers/price_signals.py --months 12

      - name: Run SunSirs fiber prices scraper
        run: python scrapers/sunsirs_prices.py --all

      - name: Debug openai version
        run: |
          python -c "import openai; print('openai:', openai.__version__)"
          python -c "import httpx; print('httpx:', httpx.__version__)"

      - name: Run LLM analyzer
        run: python scrapers/llm_analyzer.py --limit 50

      - name: Run Texhibition exhibitor scraper
        run: python scrapers/texhibition_scraper.py

      - name: Send Telegram report
        run: python scrapers/telegram_reporter.py
