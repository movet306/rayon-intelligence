name: Daily Scraper

on:
  schedule:
    - cron: "23 7 * * *"   # 07:23 UTC = 10:23 Istanbul (off-hour to reduce queue delay)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Run scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DATABASE_URL:          ${{ secrets.RAYON_DATABASE_URL }}
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          python -c "import httpx; print('httpx:', httpx.__version__)"
          python -c "import requests; print('requests:', requests.__version__)"

      - name: Run fibre2fashion scraper
        run: python scrapers/fibre2fashion.py --pages 2

      - name: Run just_style scraper
        run: python scrapers/just_style.py --pages 2

      - name: Run tekstil_teknik scraper
        run: python scrapers/tekstil_teknik.py --pages 3

      - name: Run textilegence scraper
        run: python scrapers/textilegence.py --pages 5

      - name: Run IHKIB scraper
        run: python scrapers/ihkib.py --pages 1

      - name: Run EURATEX scraper
        run: python scrapers/euratex.py --pages 1

      - name: Run price signals scraper
        run: python scrapers/price_signals.py --months 12

      - name: Run SunSirs fiber prices scraper
        run: python scrapers/sunsirs_prices.py --all

      - name: Run ICE Cotton scraper
        run: python scrapers/ice_cotton.py
      - name: Build price metrics daily
        run: python scrapers/build_price_metrics.py

      - name: Run LLM analyzer
        run: python scrapers/llm_analyzer.py --limit 250

      - name: Build price intelligence signals
        run: python scrapers/build_price_signals.py

      - name: Run Texhibition exhibitor scraper
        continue-on-error: true   # site URL changed; soft-fail until Phase E re-evaluation
        run: python scrapers/texhibition_scraper.py

      - name: Send Telegram report
        run: python scrapers/telegram_reporter.py

