name: Weekly Competitor Monitor

on:
  schedule:
    - cron: "0 9 * * 1"   # 09:00 UTC every Monday = 12:00 Istanbul (UTC+3)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  monitor:
    name: Check competitor homepages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL:       ${{ secrets.RAYON_DATABASE_URL }}
      COMTRADE_API_KEY:   ${{ secrets.COMTRADE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run competitor monitor
        run: python scrapers/competitor_monitor.py

      - name: Run Comtrade trade flows scraper
        run: python scrapers/trade_flows.py --months 3
        # Fetches the 3 most recent available months; Comtrade lags ~5-15 months.
        # ON CONFLICT DO UPDATE so re-runs are safe.
